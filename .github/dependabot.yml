version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      dev-deps:
        patterns: ["pytest*", "ruff", "mypy", "vcrpy"]
      prod-deps:
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff", "mypy", "vcrpy"]
