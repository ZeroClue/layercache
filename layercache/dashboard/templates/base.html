<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayerCache Dashboard</title>
<script src="/static/vendor/htmx.min.js"></script>
<script src="/static/vendor/chart.umd.min.js"></script>
<script src="/static/dashboard.js"></script>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body class="{% block body_class %}{% endblock %}">
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">LC</div>
    <div class="sidebar-brand">
      <h2>LayerCache</h2>
      <span class="sidebar-version" id="version-label">v{{ app_version }}</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard/" class="nav-item {% block nav_overview %}{% endblock %}">&#9673; Overview</a>
    <a href="/dashboard/models" class="nav-item {% block nav_models %}{% endblock %}">&#8862; Models</a>
    <a href="/dashboard/cache" class="nav-item {% block nav_cache %}{% endblock %}">&#9889; Cache</a>
    <a href="/dashboard/analytics" class="nav-item {% block nav_analytics %}{% endblock %}">&#128202; Analytics</a>
    <a href="/dashboard/templates" class="nav-item {% block nav_templates %}{% endblock %}">&#9998; Templates</a>
    <a href="/dashboard/config" class="nav-item {% block nav_config %}{% endblock %}">&#9881; Config</a>
    <a href="/dashboard/logs" class="nav-item {% block nav_logs %}{% endblock %}">&#9776; Logs</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/dashboard/logout" class="nav-item logout">Log out</a>
  </div>
</div>
<div class="main">
  <div class="main-header">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    {% block header_extra %}{% endblock %}
  </div>
  <div id="main-content" class="main-content">
    {% block content %}{% endblock %}
  </div>
</div>
<div id="toast-container"></div>
</body>
</html>
