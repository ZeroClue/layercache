# yaml-language-server: $schema=./layercache.schema.json
proxy:
  host: 0.0.0.0
  port: 8000
  log_level: debug
providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  openai:
    api_key_env: OPENAI_API_KEY
  gemini:
    api_key_env: GOOGLE_API_KEY
  opencode:
    api_key_env: OPENCODE_ZEN_API_KEY
    base_url: https://opencode.ai/zen/v1
    # Full Zen API — paid (qwen3.5-plus, gpt-5.5, etc.) and free (-free suffix) models
  opencode-go:
    api_key_env: OPENCODE_ZEN_API_KEY
    base_url: https://opencode.ai/zen/go/v1
    default_model: opencode-go/qwen3.5-plus
    # Go model IDs match client names exactly — no aliases needed
    # (deepseek-v4-flash on Go is the same name the client sends)
  ollama-cloud:
    api_key_env: OLLAMA_API_KEY
    base_url: https://ollama.com/v1
    # Model names from Claude Code have a :cloud suffix (e.g. deepseek-v4-pro:cloud)
    # LayerCache strips the suffix and routes to Ollama Cloud's OpenAI-compatible API
caching:
  semantic:
    enabled: true
    backend: sqlite
    db_path: /data/layercache_semantic.db
    similarity_threshold: 0.95
    default_ttl: 3600
  metrics:
    db_path: /data/layercache/metrics.db
    snapshot_interval_seconds: 60
    snapshot_retention_days: 7
enhancements:
  registered: []
